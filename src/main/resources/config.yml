database:
  host: localhost
  port: 3306
  database: swarp
  username: root
  password: password
  pool-size: 10
  connection-timeout: 30000

warps:
  max-per-player: 3       # Fallback falls keine nitro.swarps.create.X Permission gesetzt
  teleport-delay: 3
  cooldown: 10
  expire-days: 30         # 0 = deaktiviert

effects:
  teleport-particles: true
  sound-on-teleport: true
  sound-on-set: true
  countdown-titles: true

# Steuert welche Felder bei /swarp info angezeigt werden
info:
  show-owner: true
  show-visits: true
  show-created: true
  show-category: true
  show-world: true
  show-expires: true
  show-description: true
