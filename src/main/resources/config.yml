database:
  host: localhost
  port: 3306
  database: swarp
  username: root
  password: password
  pool-size: 10
  connection-timeout: 30000

warps:
  max-per-player: 3
  teleport-delay: 3
  cost: 0.0
  cooldown: 10        # Sekunden zwischen Teleports
  expire-days: 30     # Warps von Spielern die X Tage offline sind löschen (0 = deaktiviert)

effects:
  teleport-particles: true
  particle-type: PORTAL
  sound-on-teleport: true
  sound-on-set: true
  countdown-titles: true
